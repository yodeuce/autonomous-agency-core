# MDP SPECIFICATION
# Constitutional Document of Agent Decision Logic
# Version: 1.0.0
# Classification: CARBON[6] AUTONOMOUS AGENCY

mdp_version: "1.0.0"
agent_id: "${AGENT_ID}"
created: "${TIMESTAMP}"

# =============================================================================
# STATE SPACE DEFINITION
# Defines all possible states the agent can observe/be in
# =============================================================================
state_space:
  type: "hybrid"  # discrete, continuous, or hybrid

  # Observable state variables
  observable:
    - name: "task_context"
      type: "categorical"
      values: ["idle", "planning", "executing", "reviewing", "escalating"]

    - name: "resource_availability"
      type: "continuous"
      range: [0.0, 1.0]
      description: "Available computational/memory resources"

    - name: "confidence_level"
      type: "continuous"
      range: [0.0, 1.0]
      description: "Agent's confidence in current beliefs"

    - name: "risk_exposure"
      type: "continuous"
      range: [0.0, 1.0]
      description: "Current risk level of pending actions"

    - name: "user_urgency"
      type: "ordinal"
      values: ["low", "normal", "high", "critical"]

    - name: "constraint_violations"
      type: "discrete"
      range: [0, 100]
      description: "Count of active constraint violations"

  # Latent (hidden) state variables - must be inferred
  latent:
    - name: "user_intent"
      type: "categorical"
      values: ["informational", "transactional", "analytical", "creative"]
      inference_method: "bayesian"

    - name: "environment_stability"
      type: "continuous"
      range: [0.0, 1.0]
      inference_method: "kalman_filter"

# =============================================================================
# ACTION SPACE DEFINITION
# All actions the agent can take
# =============================================================================
action_space:
  type: "discrete"

  actions:
    # Core execution actions
    - id: "execute_task"
      description: "Execute the current task within authority"
      preconditions:
        - "confidence_level >= 0.7"
        - "constraint_violations == 0"
      effects:
        - "task_context -> 'executing'"

    - id: "gather_information"
      description: "Retrieve additional context or data"
      preconditions: []
      effects:
        - "confidence_level += 0.1"

    - id: "request_clarification"
      description: "Ask user for additional input"
      preconditions:
        - "confidence_level < 0.5"
      effects:
        - "task_context -> 'planning'"

    - id: "escalate"
      description: "Escalate to higher authority or human"
      preconditions:
        - "risk_exposure > 0.8 OR constraint_violations > 0"
      effects:
        - "task_context -> 'escalating'"

    - id: "defer_action"
      description: "Postpone action pending more information"
      preconditions: []
      effects:
        - "task_context -> 'idle'"

    - id: "delegate"
      description: "Assign task to another agent"
      preconditions:
        - "agent_available == true"
      effects:
        - "task_context -> 'reviewing'"

    # Memory actions
    - id: "store_memory"
      description: "Commit current context to memory"
      preconditions: []
      effects:
        - "memory_updated = true"

    - id: "retrieve_memory"
      description: "Query relevant memories"
      preconditions: []
      effects:
        - "confidence_level += 0.05"

# =============================================================================
# TRANSITION MODEL
# P(s' | s, a) - Probability of next state given current state and action
# =============================================================================
transition_model:
  type: "stochastic"  # deterministic or stochastic

  # Noise assumptions for state transitions
  noise:
    observation_noise: 0.05
    transition_noise: 0.1

  # Key transition rules
  transitions:
    - condition: "action == 'execute_task' AND confidence_level >= 0.9"
      next_state: "task_context = 'reviewing'"
      probability: 0.95

    - condition: "action == 'execute_task' AND confidence_level < 0.9"
      next_state: "task_context = 'reviewing'"
      probability: 0.7

    - condition: "action == 'escalate'"
      next_state: "task_context = 'escalating'"
      probability: 1.0

# =============================================================================
# REWARD DEFINITION
# R(s, a, s') - Reward for taking action a in state s resulting in s'
# =============================================================================
reward_definition:
  # Base rewards for outcomes
  outcome_rewards:
    task_success: 100
    task_partial: 50
    task_failure: -50
    constraint_violation: -200
    escalation_appropriate: 20
    escalation_unnecessary: -10

  # Reward shaping (intermediate rewards)
  shaping_rewards:
    confidence_increase: 5
    risk_reduction: 10
    efficient_execution: 15
    memory_utilization: 3

  # Penalty structure
  penalties:
    timeout: -30
    resource_overuse: -20
    repeated_clarification: -5

  # Reference to detailed reward model
  reward_model_file: "reward_model.py"

# =============================================================================
# DISCOUNT FACTOR
# How much to weight future rewards vs immediate rewards
# =============================================================================
discount_factor:
  gamma: 0.95  # Standard discounting

  # Dynamic discount based on context
  dynamic_discount:
    enabled: true
    rules:
      - condition: "user_urgency == 'critical'"
        gamma: 0.99  # Value immediate results more
      - condition: "task_type == 'strategic'"
        gamma: 0.90  # Value long-term outcomes more

# =============================================================================
# TERMINAL STATES
# States where the episode ends
# =============================================================================
terminal_states:
  success_terminals:
    - "task_completed AND user_satisfied"
    - "escalation_resolved"

  failure_terminals:
    - "constraint_violations > 3"
    - "timeout_exceeded"
    - "unrecoverable_error"

  neutral_terminals:
    - "user_cancelled"
    - "session_ended"

# =============================================================================
# HORIZON
# Planning horizon for the MDP
# =============================================================================
horizon:
  type: "infinite"  # finite or infinite
  max_steps: 1000   # Safety limit for infinite horizon

# =============================================================================
# METADATA
# =============================================================================
metadata:
  framework: "CARBON[6] Autonomous Agency"
  compliant_with:
    - "EMP Protocol v1.0"
    - "EMV Specification v1.0"
  last_updated: "${TIMESTAMP}"
  version_history:
    - version: "1.0.0"
      date: "${TIMESTAMP}"
      changes: "Initial specification"
