# =============================================================================
# FILE 1: mdp_spec.yaml
# PURPOSE: Formal definition of the Markov Decision Process
# ROLE: Constitutional document of the agent's decision logic
# SPEC: CARBON[6] Technical Architecture Specification v1.0.0
# =============================================================================

mdp_specification:
  version: "2.0.0"
  name: "autonomous_agency_mdp"
  description: "Core MDP specification for the CARBON[6] autonomous AI agency"

  # ---------------------------------------------------------------------------
  # STATE SPACE DEFINITION
  # Partitioned into observable and latent components
  # ---------------------------------------------------------------------------
  state_space:
    type: "composite"
    partially_observable: true
    observation_model: "belief_state_updater"

    observable_states:
      - name: "task_status"
        type: "categorical"
        values: ["pending", "active", "complete", "failed", "blocked"]
        description: "Current task execution state"

      - name: "resource_availability"
        type: "continuous"
        bounds: [0.0, 1.0]
        description: "Available computational and external resources"

      - name: "constraint_status"
        type: "binary"
        values: [true, false]
        description: "Current constraint satisfaction state"

      - name: "time_remaining"
        type: "continuous"
        bounds: [0.0, null]
        description: "Time until deadline or timeout"

      - name: "memory_state"
        type: "discrete"
        description: "Current active memory context hash"
        cardinality: null  # Dynamic based on memory store size

      - name: "risk_state"
        type: "continuous"
        bounds: [0.0, 1.0]
        description: "Current risk exposure level"

    latent_states:
      - name: "user_intent"
        type: "continuous"
        inference_method: "bayesian_inference"
        description: "Inferred user objectives"

      - name: "environment_stability"
        type: "continuous"
        bounds: [0.0, 1.0]
        inference_method: "kalman_filtering"
        description: "Estimated environment volatility"

      - name: "task_complexity"
        type: "continuous"
        bounds: [0.0, 1.0]
        inference_method: "feature_based_estimation"
        description: "Estimated difficulty of current task"

  # ---------------------------------------------------------------------------
  # ACTION SPACE DEFINITION
  # Hierarchical action space organized by authority level
  # ---------------------------------------------------------------------------
  action_space:
    type: "discrete"
    actions:
      - name: "OBSERVE"
        description: "Gather information from environment without modifying state"
        cost: "low"
        reversible: true
        min_authority_level: 1  # Observation level

      - name: "ANALYZE"
        description: "Process and analyze available information"
        cost: "low"
        reversible: true
        min_authority_level: 2  # Analysis level

      - name: "RECOMMEND"
        description: "Generate recommendation for human approval"
        cost: "low"
        reversible: true
        min_authority_level: 3  # Recommendation level

      - name: "EXECUTE"
        description: "Take autonomous action within authorized scope"
        cost: "variable"
        reversible: false
        min_authority_level: 4  # Autonomous level

      - name: "ESCALATE"
        description: "Escalate decision to higher authority"
        cost: "low"
        reversible: true
        min_authority_level: 1  # Any level can escalate

      - name: "DEFER"
        description: "Postpone action pending additional information"
        cost: "opportunity_cost"
        reversible: true
        min_authority_level: 1  # Any level can defer

    constraints:
      max_actions_per_step: 1
      forbidden_actions: []  # Populated by constraint_enforcement_engine

  # ---------------------------------------------------------------------------
  # TRANSITION MODEL
  #
  # Formal: P(s' | s, a) = Σ P(s' | s, a, θ) * P(θ | history)
  #
  # Where:
  #   s'    = next state
  #   s     = current state
  #   a     = action taken
  #   θ     = environment parameters (learned from history)
  # ---------------------------------------------------------------------------
  transition_model:
    type: "learned"  # known | learned | hybrid
    stochastic: true
    markov_assumption: true
    time_homogeneous: false
    learning_method: "bayesian_update"
    confidence_threshold: 0.7
    formal_definition: "P(s' | s, a) = Σ P(s' | s, a, θ) * P(θ | history)"

  # ---------------------------------------------------------------------------
  # REWARD DEFINITION
  #
  # EMV Reward: R(s, a, s') = Σ_o P(o | s, a, s') * V(o)
  # Risk-Adjusted: R_adjusted(s, a) = U(EMV(s, a)) - λ * Risk(s, a)
  # Multi-Objective: R_total = Σ_i w_i * R_i(s, a), subject to Σ w_i = 1
  # ---------------------------------------------------------------------------
  reward_definition:
    primary_metric: "emv"
    reward_source: "reward_model.py"

    multi_objective_weights:
      - name: "task_completion"
        weight_range: [0.3, 0.5]
        default_weight: 0.4
        description: "Primary task success"

      - name: "resource_efficiency"
        weight_range: [0.1, 0.2]
        default_weight: 0.15
        description: "Minimize resource consumption"

      - name: "safety_margin"
        weight_range: [0.2, 0.3]
        default_weight: 0.25
        description: "Maintain safety buffer"

      - name: "user_satisfaction"
        weight_range: [0.1, 0.2]
        default_weight: 0.2
        description: "Inferred user preference alignment"

    bounds:
      min: -100.0
      max: 100.0

  # ---------------------------------------------------------------------------
  # DISCOUNT FACTOR
  #
  # Dynamic discounting based on urgency:
  #   γ_effective = γ_base * (1 - urgency_factor)
  #   Where urgency_factor ∈ [0, 0.3] based on deadline proximity
  # ---------------------------------------------------------------------------
  discount:
    gamma_base: 0.95
    adaptive: true
    urgency_factor_range: [0.0, 0.3]
    formula: "γ_effective = γ_base * (1 - urgency_factor)"
    description: "Balance between immediate and future rewards, adjusted for urgency"

  # ---------------------------------------------------------------------------
  # TERMINAL STATES
  # ---------------------------------------------------------------------------
  terminal_states:
    conditions:
      - name: "objective_complete"
        description: "All primary objectives achieved"
        type: "success"

      - name: "resource_exhaustion"
        description: "No remaining budget, compute, or time"
        type: "failure"

      - name: "constraint_violation"
        description: "Immutable constraint breached"
        type: "abort"

      - name: "human_override"
        description: "Human operator terminates episode"
        type: "override"

      - name: "max_steps_reached"
        description: "Episode length limit exceeded"
        max_steps: 10000
        type: "timeout"

  # ---------------------------------------------------------------------------
  # EPISODE CONFIGURATION
  # ---------------------------------------------------------------------------
  episode:
    max_length: 10000
    reset_policy: "soft"  # soft (preserve memory) | hard (full reset)
    checkpoint_interval: 100
